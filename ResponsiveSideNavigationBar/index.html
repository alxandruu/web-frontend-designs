<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Sidebar</title>

    <link href='https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="sidebar">
        <div class="logo_content">
            <div class="clock">
                12:21
            </div>
            <i class='bx bx-menu' id="btn" ></i>
        </div>
        <ul class="nav_list">
            <!-- <li>
                <i class='bx bx-search'></i>
                <input type="text" placeholder="Buscar...">
                <span class="tooltip">Buscar</span>
            </li>  -->
            <li>
                <a href="#">
                    <i class="fas fa-home"></i>
                    <span class="links_name">Página Principal</span>
                </a>
                <span class="tooltip">Página Principal</span>
            </li>
            <li>
                <a href="#">

                    <i class="far fa-clock"></i>
                    <span class="links_name">Fichar</span>
                </a>
                <span class="tooltip">Fichar</span>
            </li>
            <li>
                <a href="#">
                    <i class="far fa-comments"></i>
                    <span class="links_name">Mensajes</span>
                </a>
                <span class="tooltip">Mensajes</span>
            </li>
            <li>
                <a href="#">
                    <i class="far fa-folder-open"></i>
                    <span class="links_name">Tareas</span>
                </a>
                <span class="tooltip">Tareas</span>
            </li>
            <li>
                <a href="#">
                    <i class="far fa-file-alt"></i>
                    <span class="links_name">Informes</span>
                </a>
                <span class="tooltip">Informes</span>
            </li>
            <li>
                <a href="#">
                    <i class="fas fa-cog"></i>
                    <span class="links_name">Ajustes</span>
                </a>
                <span class="tooltip">Ajustes</span>
            </li>
            <div class="profile_content">
                <div class="profile">
                    <div class="profile_details">
                        <img src="profile3.jpg" alt="">
                        <div class="name_job">
                            <div class="name">Eduardo Castrava</div>
                            <div class="job">CEO - Erreme Studios</div>
                        </div>
                    </div>
                    <i class='bx bx-log-out' id="log_out"></i>
                </div>
            </div>

        </ul>

    </div>
    <div class="home_content">
        <div class="text">Hola! </div>
    </div>
    <script src="https://kit.fontawesome.com/1928cfaeac.js" crossorigin="anonymous"></script>
    <script>
        let btn = document.querySelector("#btn");
        let sidebar = document.querySelector(".sidebar");
        let searchBtn = document.querySelector(".bx-search");

        btn.onclick = () => {
            sidebar.classList.toggle("active");
        }
        // searchBtn.onclick = () => {
        //     sidebar.classList.toggle("active");
        // }
    </script>

</body>

</html>
